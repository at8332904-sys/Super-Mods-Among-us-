name: APK Lançador Grande Anfitrião - 25MB
on: workflow_dispatch

jobs:
  criar-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Prepara ferramentas
      - name: Instalar tudo necessário
        run: |
          sudo apt update -y
          sudo apt install -y imagemagick openjdk-17-jdk zip unzip

      # Cria a tela igual modelo
      - name: Gerar tela do lançador
        run: |
          convert -size 1080x1920 xc:"#000000" -strip tela.png
          convert tela.png \
            -font DejaVu-Sans-Bold -pointsize 120 -fill white \
            -gravity north -annotate +0+150 "GRANDE ANFITRIÃO" \
            -font DejaVu-Sans -pointsize 36 -fill white \
            -gravity north -annotate +100+350 "Precisa do Among Us 2026 instalado" \
            -gravity north -annotate +100+410 "Clique em JOGAR para abrir com mod" \
            -font DejaVu-Sans-Bold -pointsize 60 -fill white \
            -gravity center -annotate +0+200 "▶ JOGAR" \
            -quality 90 PNG:tela.png

      # Monta estrutura completa de APK
      - name: Criar estrutura Android
        run: |
          mkdir -p APK/
          # Baixa base leve de lançador vazia (~3 MB)
          wget -O base-lancador.apk "https://github.com/mods-leves/base-lancador-android/releases/download/v1.0/base.apk"
          unzip -q base-lancador.apk -d APK/
          # Coloca sua tela e arquivos do mod
          cp tela.png APK/res/drawable/tela_inicial.png
          cp -r plugins/ config.json APK/assets/mod/
          # Renomeia para APK
          cd .. && zip -9 -r Grande-Anfitriao-LANCADOR.apk APK/

      # Salva o APK pronto
      - name: Salvar aplicativo
        uses: actions/upload-artifact@v4
        with:
          name: Grande-Anfitriao-LANCADOR-25MB.apk
          path: Grande-Anfitriao-LANCADOR.apk
          
          
          
          
          
          
          
          
