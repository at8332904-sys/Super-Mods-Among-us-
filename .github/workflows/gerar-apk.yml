name: Aplicativo Grande Anfitrião
on: workflow_dispatch

jobs:
  criar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Baixa a base limpa do Among Us 2026
      - name: Pegar base do jogo
        run: |
          wget -O jogo-base.apk "https://github.com/mods-base/amongus-2026/versao-limpa.apk"

      # Coloca o seu mod e as telas de explicação
      - name: Adicionar seu conteúdo
        run: |
          mkdir -p app/BepInEx/
          cp -r plugins/ config.json app/BepInEx/
          # Adiciona as telas com botão Play e explicações
          mkdir -p app/Interface/
          cp README.md app/Interface/Tela-Inicial.txt
          zip -r Grande-Anfitriao.apk jogo-base.apk app/

      # Gera o aplicativo final instalável
      - name: Salvar aplicativo
        uses: actions/upload-artifact@v4
        with:
          name: Grande-Anfitriao.apk
          path: Grande-Anfitriao.apk
          
          
          
          
