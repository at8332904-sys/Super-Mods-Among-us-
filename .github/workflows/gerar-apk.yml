name: Aplicativo Grande Anfitrião
on: workflow_dispatch

jobs:
  criar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cria a estrutura pronta para usar, sem precisar baixar nada de fora
      - name: Montar estrutura do mod
        run: |
          mkdir -p Pacote-Mod/BepInEx/plugins/
          cp -r plugins/* Pacote-Mod/BepInEx/plugins/
          cp config.json README.md Pacote-Mod/
          # Adiciona as suas telas e explicações
          mkdir -p Pacote-Mod/Interface/
          echo "BEM-VINDO AO GRANDE ANFITRIÃO" > Pacote-Mod/Interface/Inicio.txt
          echo "Botão Play: Iniciar Jogo" >> Pacote-Mod/Interface/Inicio.txt
          echo "Todas as regras e cargos do seu mod aqui" >> Pacote-Mod/Interface/Inicio.txt
          zip -r Grande-Anfitriao-PRONTO.zip Pacote-Mod/

      # Salva o pacote final
      - name: Salvar pacote
        uses: actions/upload-artifact@v4
        with:
          name: Grande-Anfitriao-PRONTO
          path: Grande-Anfitriao-PRONTO.zip
          
          
          
          
          
