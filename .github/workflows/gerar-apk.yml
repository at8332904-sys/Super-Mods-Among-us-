name: Gerar APK Grande Anfitrião
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Preparar arquivos do mod e gerar APK
        run: |
          echo "Juntando tudo e montando o APK..."
          # Aqui você coloca o comando que empacota seu mod no formato APK
          # Se usa base do BepInEx/Among Us Android, adiciona o comando de build aqui
          # Por enquanto vamos criar um pacote com todos os seus arquivos:
          zip -r Grande-Anfitriao.apk plugins/ config.json README.md

      - name: Guardar APK pronto
        uses: actions/upload-artifact@v4
        with:
          name: Grande-Anfitriao-APK
          path: Grande-Anfitriao.apk

      - name: Adicionar APK aos lançamentos
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Grande-Anfitriao.apk
          
          
          
